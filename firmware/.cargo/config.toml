[target.thumbv7em-none-eabihf]
# Flash firmware via ST-LINK V3 on the Nucleo board using probe-rs.
# Usage: cargo run --package dongle-h753
# Array form avoids whitespace-splitting the --log-format argument.
runner = ["probe-rs", "run", "--chip", "STM32H753ZITx", "--log-format", "{t} [{L}] {s}"]
rustflags = [
	"-C",
	"link-arg=-Tlink.x",
	"-C",
	"link-arg=-Tdefmt.x",
]

[build]
target = "thumbv7em-none-eabihf"

[env]
# Tell embassy-stm32 which chip we are targeting.
DEFMT_LOG = "debug"
