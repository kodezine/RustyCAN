[target.thumbv7em-none-eabihf]
# Flash firmware via ST-LINK V3E on the STM32H743I-EVAL (MB1246 Rev E) using probe-rs.
# Usage: cd firmware/dongle-h743 && cargo run --release
# Only the runner is overridden here; rustflags and [build] target are inherited
# from firmware/.cargo/config.toml (workspace level).
runner = ["probe-rs", "run", "--chip", "STM32H743XIHx", "--log-format", "{t} [{L}] {s}"]
