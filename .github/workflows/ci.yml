name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']   # tags are handled exclusively by release.yml
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disable incremental compilation in CI (cache handles reuse)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Host app — build + test on all three target platforms ────────────────
  check:
    name: Check host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lint: true           # only run fmt/clippy once (on macOS)
          - os: windows-latest
            lint: false
          - os: ubuntu-22.04
            lint: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Rust dependency + build-artifact cache.
      # cache-on-failure: saves partial cache even when a subsequent step fails,
      # so the next run doesn't rebuild from scratch.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: host-${{ matrix.os }}

      # Linux: install GUI + packaging system libraries.
      # Uses GitHub's built-in apt cache (actions/cache is implicit via apt).
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Format
        if: matrix.lint
        run: cargo fmt --check

      - name: Clippy
        if: matrix.lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build -p rustycan

      - name: Test
        run: cargo test -p rustycan

  # ─── Firmware ─────────────────────────────────────────────────────────────
  firmware:
    name: Check firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware -> firmware/target
          cache-on-failure: true
          key: firmware-ubuntu

      - name: Format
        working-directory: firmware
        run: cargo fmt --check

      - name: Clippy
        working-directory: firmware
        run: cargo clippy --target thumbv7em-none-eabihf -- -D warnings

      - name: Firmware check
        working-directory: firmware
        run: cargo check --target thumbv7em-none-eabihf

