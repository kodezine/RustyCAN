name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']   # tags are handled exclusively by release.yml
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # disable incremental compilation in CI (cache handles reuse)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Host app — build + test on all three target platforms ────────────────
  check:
    name: Check host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lint: true           # only run fmt/clippy once (on macOS)
          - os: windows-latest
            lint: false
          - os: ubuntu-22.04
            lint: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Rust dependency + build-artifact cache.
      # cache-on-failure: saves partial cache even when a subsequent step fails,
      # so the next run doesn't rebuild from scratch.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false          # dtolnay/rust-toolchain manages ~/.cargo/bin; caching it can
                                    # restore a stale rustup-init stub and break subsequent cargo calls
          key: host-${{ matrix.os }}

      # Linux: install GUI + packaging system libraries + Xvfb + software GL
      # for egui_kittest wgpu snapshot tests (no GPU on CI runners).
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev \
            xvfb libgl1-mesa-dri libegl1

      - name: Format
        if: matrix.lint
        run: cargo fmt --check

      - name: Clippy
        if: matrix.lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build -p rustycan

      # macOS / Windows: hardware rendering is available; run tests directly.
      - name: Test (macOS / Windows)
        if: matrix.os != 'ubuntu-22.04'
        run: cargo test -p rustycan

      # Linux: no GPU on CI runners — use Xvfb + Mesa software GL so that
      # egui_kittest wgpu snapshot tests can render headlessly.
      - name: Test (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: xvfb-run -s "-screen 0 1920x1080x24" cargo test -p rustycan
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"

  # ─── Firmware ─────────────────────────────────────────────────────────────
  firmware:
    name: Check firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware -> firmware/target
          cache-on-failure: true
          key: firmware-ubuntu

      - name: Format
        working-directory: firmware
        run: cargo fmt --check

      - name: Clippy dongle-h743
        working-directory: firmware
        run: cargo clippy -p dongle-h743 --target thumbv7em-none-eabihf -- -D warnings

      - name: Clippy dongle-h753
        working-directory: firmware
        run: cargo clippy -p dongle-h753 --target thumbv7em-none-eabihf -- -D warnings

      - name: Firmware check dongle-h743
        working-directory: firmware
        run: cargo check -p dongle-h743 --target thumbv7em-none-eabihf

      - name: Firmware check dongle-h753
        working-directory: firmware
        run: cargo check -p dongle-h753 --target thumbv7em-none-eabihf

  # ─── Web dashboard — Playwright tests ─────────────────────────────────────
  web-tests:
    name: Web tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/ui/playwright/package-lock.json

      - name: Install npm deps
        working-directory: tests/ui/playwright
        run: npm ci

      - name: Install Playwright Chromium + system deps
        working-directory: tests/ui/playwright
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: tests/ui/playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: target/playwright-report/
          retention-days: 7

