name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']   # tags are handled exclusively by release.yml
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (host)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build -p rustycan

      - name: Test
        run: cargo test -p rustycan

  firmware:
    name: Check (firmware)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware -> firmware/target

      - name: Format
        working-directory: firmware
        run: cargo fmt --check

      - name: Clippy
        working-directory: firmware
        run: cargo clippy --target thumbv7em-none-eabihf -- -D warnings

      - name: Firmware check
        working-directory: firmware
        run: cargo check --target thumbv7em-none-eabihf
