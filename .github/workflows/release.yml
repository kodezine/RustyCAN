name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ─── Host app — matrix across three platforms ─────────────────────────────
  release-host:
    name: Release host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            formats: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Windows: probe that the crate compiles before spending time on packaging
      - name: Probe Windows build
        if: matrix.os == 'windows-latest'
        run: cargo check -p rustycan

      # Linux: install AppImage / deb packaging tools needed by cargo-packager
      - name: Install Linux packaging deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev \
            squashfs-tools fuse libfuse2 file zsync

      # cargo-packager CLI — pinned to a stable release
      - name: Install cargo-packager
        run: cargo install cargo-packager --version "^0.11" --locked

      - name: Build release binary
        run: cargo build --release -p rustycan

      - name: Strip binary (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: strip target/release/rustycan 2>/dev/null || true

      - name: Package (${{ matrix.formats }})
        working-directory: host
        shell: bash
        run: |
          cargo packager --release \
            --formats "${{ matrix.formats }}" \
            --out-dir ../dist

      # ── Collect artifact paths ──────────────────────────────────────────
      - name: List dist
        shell: bash
        run: ls -lh dist/

      - name: Set artifact name (macOS DMG)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          DMG=$(ls dist/*.dmg | head -1)
          DEST="dist/rustycan-${TAG}-aarch64-apple-darwin.dmg"
          mv "$DMG" "$DEST"
          echo "ARTIFACT=$DEST" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Set artifact name (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXE=$(ls dist/*.exe | head -1)
          DEST="dist/rustycan-${TAG}-x86_64-pc-windows-msvc.exe"
          mv "$EXE" "$DEST"
          echo "ARTIFACT=$DEST" >> "$GITHUB_ENV"

      - name: Set artifact name (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          APPIMAGE=$(ls dist/*.AppImage 2>/dev/null | head -1)
          DEB=$(ls dist/*.deb 2>/dev/null | head -1)
          DEST_AI="dist/rustycan-${TAG}-x86_64-linux.AppImage"
          [[ -n "$APPIMAGE" ]] && mv "$APPIMAGE" "$DEST_AI"
          echo "ARTIFACT=$DEST_AI" >> "$GITHUB_ENV"
          [[ -n "$DEB" ]] && echo "DEB_PATH=$DEB" >> "$GITHUB_ENV"

      # ── Upload to GitHub Release ────────────────────────────────────────
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.DEB_PATH }}

      # ── Trigger Homebrew tap update via repository_dispatch ────────────
      # The tap repo's own workflow commits using its GITHUB_TOKEN — this
      # token only needs permission to trigger a dispatch event, not push access.
      - name: Trigger Homebrew tap update
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          DMG_FILENAME=$(basename "$DMG_PATH")
          DMG_URL="https://github.com/kodezine/RustyCAN/releases/download/${TAG}/${DMG_FILENAME}"

          curl --fail-with-body -s -X POST \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kodezine/homebrew-rustycan/dispatches \
            -d "{\"event_type\":\"new-release\",\"client_payload\":{\"version\":\"${VERSION}\",\"sha256\":\"${SHA256}\",\"url\":\"${DMG_URL}\"}}"

  # ─── Firmware ─────────────────────────────────────────────────────────────
  release-firmware:
    name: Release firmware
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - uses: Swatinem/rust-cache@v2

      - name: Build firmware
        working-directory: firmware
        run: cargo build --release --target thumbv7em-none-eabihf

      - name: Stage firmware ELF
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          FIRMWARE_ELF="dongle-h753-${TAG}.elf"
          cp firmware/target/thumbv7em-none-eabihf/release/dongle-h753 "$FIRMWARE_ELF"
          echo "FIRMWARE_ELF=$FIRMWARE_ELF" >> "$GITHUB_ENV"

      - name: Create GitHub Release (with notes)
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ env.FIRMWARE_ELF }}
