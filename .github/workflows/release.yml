name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*'

env:
  CARGO_TERM_COLOR: always
  # softprops/action-gh-release still declares `using: node20` internally.
  # Force Node 24 now to silence deprecation warnings ahead of the June 2026
  # deadline when Node 24 becomes the default runner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  # ─── Host app — matrix across three platforms ─────────────────────────────
  release-host:
    name: Release host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            formats: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Windows: probe that the crate compiles before spending time on packaging
      - name: Probe Windows build
        if: matrix.os == 'windows-latest'
        run: cargo check -p rustycan

      # Linux: install AppImage / deb packaging tools needed by cargo-packager
      - name: Install Linux packaging deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev \
            squashfs-tools fuse libfuse2 file zsync

      # cargo-packager CLI — pinned to a stable release
      - name: Install cargo-packager
        run: cargo install cargo-packager --version "^0.11" --locked

      - name: Build release binary
        run: cargo build --release -p rustycan

      - name: Strip binary (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: strip target/release/rustycan 2>/dev/null || true

      - name: Package (${{ matrix.formats }})
        working-directory: host
        shell: bash
        run: |
          cargo packager --release \
            --formats "${{ matrix.formats }}" \
            --out-dir ../dist

      # ── Collect artifact paths ──────────────────────────────────────────
      - name: List dist
        shell: bash
        run: ls -lh dist/

      - name: Set artifact paths
        id: set-artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$RUNNER_OS" in
            macOS)
              DMG=$(ls dist/*.dmg | head -1)
              DEST="dist/rustycan-${TAG}-aarch64-apple-darwin.dmg"
              mv "$DMG" "$DEST"
              echo "artifact=$DEST" >> "$GITHUB_OUTPUT"
              echo "dmg_path=$DEST" >> "$GITHUB_OUTPUT"
              ;;
            Windows)
              EXE=$(ls dist/*.exe | head -1)
              DEST="dist/rustycan-${TAG}-x86_64-pc-windows-msvc.exe"
              mv "$EXE" "$DEST"
              echo "artifact=$DEST" >> "$GITHUB_OUTPUT"
              ;;
            Linux)
              APPIMAGE=$(ls dist/*.AppImage 2>/dev/null | head -1)
              DEB=$(ls dist/*.deb 2>/dev/null | head -1)
              DEST_AI="dist/rustycan-${TAG}-x86_64-linux.AppImage"
              DEST_DEB="dist/rustycan-${TAG}-x86_64-linux.deb"
              [[ -n "$APPIMAGE" ]] && mv "$APPIMAGE" "$DEST_AI"
              [[ -n "$DEB" ]] && mv "$DEB" "$DEST_DEB"
              echo "artifact=$DEST_AI" >> "$GITHUB_OUTPUT"
              [[ -n "$DEB" ]] && echo "deb_path=$DEST_DEB" >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── Upload to GitHub Release ────────────────────────────────────────
      - name: Upload release artifact
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: ${{ steps.set-artifact.outputs.artifact }}

      - name: Upload Linux DEB
        if: steps.set-artifact.outputs.deb_path != ''
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: ${{ steps.set-artifact.outputs.deb_path }}

      # ── Trigger Homebrew tap update via repository_dispatch ────────────
      # The tap repo's own workflow commits using its GITHUB_TOKEN — this
      # token only needs permission to trigger a dispatch event, not push access.
      - name: Trigger Homebrew tap update
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DMG_PATH="${{ steps.set-artifact.outputs.dmg_path }}"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          DMG_FILENAME=$(basename "$DMG_PATH")
          DMG_URL="https://github.com/kodezine/RustyCAN/releases/download/${TAG}/${DMG_FILENAME}"

          curl --fail-with-body -s -X POST \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kodezine/homebrew-rustycan/dispatches \
            -d "{\"event_type\":\"new-release\",\"client_payload\":{\"version\":\"${VERSION}\",\"sha256\":\"${SHA256}\",\"url\":\"${DMG_URL}\"}}"

  # ─── Firmware ─────────────────────────────────────────────────────────────
  release-firmware:
    name: Release firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install arm-none-eabi binutils
        run: sudo apt-get install -y --no-install-recommends binutils-arm-none-eabi

      - name: Build dongle-h753 firmware
        working-directory: firmware
        run: cargo build -p dongle-h753 --release --target thumbv7em-none-eabihf

      - name: Build dongle-h743 firmware
        working-directory: firmware
        run: cargo build -p dongle-h743 --release --target thumbv7em-none-eabihf

      - name: Build bootloader-h753
        working-directory: firmware
        run: cargo build -p bootloader-h753 --release --target thumbv7em-none-eabihf

      - name: Build bootloader-h743
        working-directory: firmware
        run: cargo build -p bootloader-h743 --release --target thumbv7em-none-eabihf

      - name: Build sign-firmware tool
        run: cargo build -p sign-firmware --release

      - name: Stage, convert and sign firmware
        id: firmware
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.KCAN_SIGNING_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          FW_DIR="firmware/target/thumbv7em-none-eabihf/release"

          BL_H753="bootloader-h753-${TAG}.elf"
          BL_H743="bootloader-h743-${TAG}.elf"
          FW_H753_BIN="dongle-h753-${TAG}.bin"
          FW_H743_BIN="dongle-h743-${TAG}.bin"
          FW_H753_SIGNED="dongle-h753-${TAG}.bin.signed"
          FW_H743_SIGNED="dongle-h743-${TAG}.bin.signed"

          # Stage bootloader ELFs (no signing needed — distributed for re-flashing via SWD)
          cp "${FW_DIR}/bootloader-h753" "$BL_H753"
          cp "${FW_DIR}/bootloader-h743" "$BL_H743"

          # Convert dongle ELFs → flat binary for signing
          arm-none-eabi-objcopy -O binary "${FW_DIR}/dongle-h753" "$FW_H753_BIN"
          arm-none-eabi-objcopy -O binary "${FW_DIR}/dongle-h743" "$FW_H743_BIN"

          # Sign (private key is a hex-encoded 32-byte Ed25519 seed)
          ./target/release/sign-firmware --key "$SIGNING_KEY" "$FW_H753_BIN"
          ./target/release/sign-firmware --key "$SIGNING_KEY" "$FW_H743_BIN"

          echo "bl_h753=${BL_H753}"           >> "$GITHUB_OUTPUT"
          echo "bl_h743=${BL_H743}"           >> "$GITHUB_OUTPUT"
          echo "fw_h753_signed=${FW_H753_SIGNED}" >> "$GITHUB_OUTPUT"
          echo "fw_h743_signed=${FW_H743_SIGNED}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.firmware.outputs.bl_h753 }}
            ${{ steps.firmware.outputs.bl_h743 }}
            ${{ steps.firmware.outputs.fw_h753_signed }}
            ${{ steps.firmware.outputs.fw_h743_signed }}

  # ─── Requirements documentation ───────────────────────────────────────────
  release-docs:
    name: Requirements docs
    runs-on: ubuntu-latest
    # Run after firmware so release notes are already generated; upload
    # independently so a docs failure does not block firmware artifacts.
    needs: [release-firmware]
    if: always()

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: pip install doorstop

      # Fail the release if requirements have broken links or invalid structure.
      - name: Validate requirements tree
        run: doorstop

      # Use the release tag as the authoritative version in SOUP001.
      # Change is ephemeral — not committed back to the repo.
      - name: Inject git version into SOUP001
        run: |
          sed -i "s/__GIT_VERSION__/${GITHUB_REF_NAME}/" reqs/soup/SOUP001.md

      - name: Publish requirements HTML
        run: doorstop publish all docs/reqs-output

      # Apply RustyCAN theme: CSS + 128×128 app icon as navbar logo.
      - name: Apply RustyCAN theme
        run: |
          cp reqs/brand/doorstop.css docs/reqs-output/template/doorstop.css
          cp host/assets/RustyCAN.iconset/icon_128x128.png \
             docs/reqs-output/template/logo-black-white.png

      # Zip with tag + timestamp so the archive is self-identifying.
      - name: Archive requirements docs
        id: archive
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          ARCHIVE="rustycan-requirements-${TAG}-${TIMESTAMP}.zip"
          zip -r "$ARCHIVE" docs/reqs-output/
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload requirements archive to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: ${{ steps.archive.outputs.archive }}

      # Push directly to the gh-pages branch so that tag-triggered runs are
      # not blocked by the github-pages environment protection rules (which
      # only allow deployments from specific branches, not tags).
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/reqs-output/
