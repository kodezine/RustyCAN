# https://pre-commit.com
#
# Setup (run once after cloning):
#   brew install pre-commit   # or: pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      # ── Formatting ──────────────────────────────────────────────────────────
      - id: cargo-fmt
        name: cargo fmt
        description: Enforce Rust code style via rustfmt.
        language: system
        entry: cargo fmt --
        pass_filenames: false
        types: [rust]

      - id: cargo-fmt-firmware
        name: cargo fmt (firmware)
        description: Enforce Rust code style for the firmware workspace.
        language: system
        entry: cargo fmt --manifest-path firmware/Cargo.toml --all --
        pass_filenames: false
        types: [rust]

      # ── Linting ─────────────────────────────────────────────────────────────
      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code with Clippy, treating warnings as errors.
        language: system
        entry: cargo clippy --all-targets -- -D warnings
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy-h753
        name: cargo clippy (dongle-h753)
        description: Lint dongle-h753 firmware with Clippy (warnings = errors).
        language: system
        entry: cargo clippy --manifest-path firmware/Cargo.toml -p dongle-h753 --target thumbv7em-none-eabihf -- -D warnings
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy-h743
        name: cargo clippy (dongle-h743)
        description: Lint dongle-h743 firmware with Clippy (warnings = errors).
        language: system
        entry: cargo clippy --manifest-path firmware/Cargo.toml -p dongle-h743 --target thumbv7em-none-eabihf -- -D warnings
        pass_filenames: false
        types: [rust]

      # ── Requirements (Doorstop) ──────────────────────────────────────────────
      - id: doorstop-validate
        name: doorstop validate
        description: >
          Validate the Doorstop requirements tree (broken links, unreviewed
          items, missing parent links) whenever a file under reqs/ changes.
        language: python
        additional_dependencies: ['doorstop']
        entry: doorstop
        args: []
        pass_filenames: false
        files: ^reqs/
